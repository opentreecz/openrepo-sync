name: Docker

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]
  # Manual re-run: rebuilds from the newest successful Release run's
  # artifacts (they expire after 7 days) and refreshes the release notes.
  workflow_dispatch:

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"

      # ── Download the .deb packages built by the release workflow ────────────
      # On workflow_run the triggering run's ID is used directly; on manual
      # dispatch, fall back to the newest successful Release run on main.
      - name: Resolve source Release run
        id: source
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.event.workflow_run.id }}"
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(gh run list --repo "${{ github.repository }}" \
              --workflow release.yml --branch main --status success \
              --limit 1 --json databaseId --jq '.[0].databaseId')
          fi
          if [ -z "$RUN_ID" ]; then
            echo "No successful Release run found to pull artifacts from." >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

          # If the Release run skipped building (tag already existed), there are
          # no artifacts — bail out cleanly instead of failing on download.
          ARTIFACT_COUNT=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID/artifacts" \
            --jq '.total_count')
          if [ "$ARTIFACT_COUNT" = "0" ]; then
            echo "Release run $RUN_ID produced no artifacts (tag already existed) — skipping Docker build."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download amd64 packages
        if: steps.source.outputs.skip != 'true'
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow:    release.yml
          run_id:      ${{ steps.source.outputs.run_id }}
          name:        packages-amd64
          path:        docker-context/

      - name: Download arm64 packages
        if: steps.source.outputs.skip != 'true'
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow:    release.yml
          run_id:      ${{ steps.source.outputs.run_id }}
          name:        packages-arm64
          path:        docker-context/

      - name: Download armhf packages
        if: steps.source.outputs.skip != 'true'
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow:    release.yml
          run_id:      ${{ steps.source.outputs.run_id }}
          name:        packages-armhf
          path:        docker-context/

      - name: Copy Dockerfile into build context
        if: steps.source.outputs.skip != 'true'
        run: cp Dockerfile docker-context/

      - name: List build context
        if: steps.source.outputs.skip != 'true'
        run: ls -lh docker-context/

      # ── Multi-platform builder ───────────────────────────────────────────────
      - name: Set up QEMU
        if: steps.source.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.source.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.source.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: steps.source.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openrepo-sync
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      # ── Build and push ───────────────────────────────────────────────────────
      - name: Build and push
        if: steps.source.outputs.skip != 'true'
        id: push
        uses: docker/build-push-action@v6
        with:
          context:   docker-context/
          file:      docker-context/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GITHUB_REPOSITORY=${{ github.repository }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── Add Docker section to the GitHub release notes ───────────────────────
      # The section template is written with a quoted heredoc (no shell
      # expansion — the ``` fences must never reach eval/echo, where backticks
      # would run as command substitution) and filled in with envsubst,
      # restricted to the three placeholders it should touch.
      - name: Update release notes with Docker info
        if: steps.source.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG:      ${{ steps.version.outputs.tag }}
          DIGEST:   ${{ steps.push.outputs.digest }}
          REPO:     ${{ github.repository }}
          OWNER:    ${{ github.repository_owner }}
        run: |
          # Keep everything before any previously written Docker section, so
          # re-runs replace it instead of appending a duplicate.
          command -v envsubst >/dev/null \
            || sudo apt-get install -y --no-install-recommends gettext-base

          gh release view "$TAG" --repo "$REPO" --json body --jq .body \
            | sed '/^### Docker image/,$d' > body.md
          printf '\n' >> body.md

          cat >> body.md <<'SECTION'
          ### Docker image

          ```
          ghcr.io/${OWNER}/openrepo-sync:${TAG}
          ghcr.io/${OWNER}/openrepo-sync:latest
          ```

          **Digest:** `${DIGEST}`

          **Supported platforms:** `linux/amd64` · `linux/arm64` · `linux/arm/v7`

          #### Pull and run

          ```sh
          docker pull ghcr.io/${OWNER}/openrepo-sync:${TAG}

          docker run --rm \
            -v ./config.yaml:/config.yaml:ro \
            -v ./projects:/projects:ro \
            ghcr.io/${OWNER}/openrepo-sync:${TAG} \
            --config /config.yaml --projects /projects
          ```
          SECTION

          envsubst '${OWNER} ${TAG} ${DIGEST}' < body.md > body-final.md

          gh release edit "$TAG" --repo "$REPO" --notes-file body-final.md
