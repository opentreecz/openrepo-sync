name: Release

on:
  push:
    branches:
      - main

jobs:
  # ── 1. Bump version in Cargo.toml and push, then expose the new version ─────
  version:
    name: Read version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if this push is itself the version-bump commit to avoid a loop.
          if git log -1 --pretty=%s | grep -q '^\[release\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          MSG=$(git log -1 --pretty=%s)
          if echo "$MSG" | grep -qi '\[major\]'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$MSG" | grep -qi '\[minor\]'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW="$MAJOR.$MINOR.$PATCH"
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$NEW\"/}" Cargo.toml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "[release] bump version to $NEW"
          git push origin main

          echo "version=$NEW"   >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW"      >> "$GITHUB_OUTPUT"
          echo "skip=false"     >> "$GITHUB_OUTPUT"

  # ── 2. Build fully static binaries for all target platforms ────────────────
  # Built inside debian:bookworm-slim (matching the Dockerfile's runtime base)
  # and linked against musl instead of glibc, so the resulting binary has no
  # dynamic libc dependency at all — it can't drift out of sync with whatever
  # glibc the image (or the GitHub Actions runner) happens to ship.
  build:
    name: Build · ${{ matrix.target }}
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    container: debian:bookworm-slim
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch:   amd64
          - target: aarch64-unknown-linux-musl
            arch:   arm64
          - target: armv7-unknown-linux-musleabihf
            arch:   armhf

    steps:
      - name: Install build dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential xz-utils file

      - uses: actions/checkout@v4

      - name: Install Rust toolchain + target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable \
              --target ${{ matrix.target }}
          # $GITHUB_PATH does not propagate into container steps; use $GITHUB_ENV instead.
          echo "PATH=$HOME/.cargo/bin:$PATH" >> "$GITHUB_ENV"

      - name: Install Zig (cross linker/compiler used by cargo-zigbuild)
        run: |
          curl -L https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz -o /tmp/zig.tar.xz
          mkdir -p /opt/zig
          tar -xf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          echo "PATH=/opt/zig:$PATH" >> "$GITHUB_ENV"

      # actions/cache requires the runner toolkit (Node.js) which is not available
      # inside debian:bookworm-slim — skip caching for the containerized build job.

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build static release binary
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Verify binary is statically linked
        run: |
          file target/${{ matrix.target }}/release/openrepo-sync
          ! file target/${{ matrix.target }}/release/openrepo-sync | grep -q "dynamically linked"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/openrepo-sync
          retention-days: 7

  # ── 3. Package into .deb and .rpm ──────────────────────────────────────────
  package:
    name: Package · ${{ matrix.arch }}
    needs: [version, build]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch:    amd64
            rpm_arch: x86_64
          - arch:    arm64
            rpm_arch: aarch64
          - arch:    armhf
            rpm_arch: armv7hl

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.arch }}
          path: dist/bin/

      - name: Make binary executable
        run: chmod +x dist/bin/openrepo-sync

      - name: Install packaging tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            dpkg-dev \
            rpm \
            fakeroot

      - name: Build .deb
        env:
          VERSION: ${{ needs.version.outputs.version }}
          ARCH:    ${{ matrix.arch }}
        run: |
          PKG="openrepo-sync_${VERSION}_${ARCH}"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/man/man1"
          mkdir -p "${PKG}/usr/share/doc/openrepo-sync"

          install -m755 dist/bin/openrepo-sync "${PKG}/usr/bin/openrepo-sync"
          install -m644 man/man1/openrepo-sync.1 "${PKG}/usr/share/man/man1/openrepo-sync.1"
          gzip -9 "${PKG}/usr/share/man/man1/openrepo-sync.1"
          install -m644 README.md "${PKG}/usr/share/doc/openrepo-sync/README.md"

          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: openrepo-sync
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: openrepo-sync contributors
          Description: Sync packages from upstream sources into an OpenRepo repository
           openrepo-sync checks GitHub Releases, direct URLs, and SourceForge for
           new package versions, uploads them to a self-hosted OpenRepo instance,
           and prunes old releases beyond a configured keep count.
          Homepage: https://github.com/${{ github.repository }}
          EOF

          fakeroot dpkg-deb --build "${PKG}"
          echo "deb_file=${PKG}.deb" >> "$GITHUB_ENV"

      - name: Build .rpm
        env:
          VERSION: ${{ needs.version.outputs.version }}
          ARCH:    ${{ matrix.rpm_arch }}
        run: |
          # Staged outside ~/rpmbuild/BUILD on purpose: rpm 4.20+ builds each
          # package under BUILD/<name>-<version>-build/ and nests BUILDROOT
          # inside that same directory, so `cp -a $BUILDDIR/. $BUILDROOT/`
          # would copy the tree into itself. A separate staging dir avoids
          # the nesting entirely, independent of that internal layout.
          STAGE="$HOME/rpm-stage"
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          install -Dm755 dist/bin/openrepo-sync \
            "$STAGE/usr/bin/openrepo-sync"
          install -Dm644 man/man1/openrepo-sync.1 \
            "$STAGE/usr/share/man/man1/openrepo-sync.1"
          gzip -9 "$STAGE/usr/share/man/man1/openrepo-sync.1"
          install -Dm644 README.md \
            "$STAGE/usr/share/doc/openrepo-sync/README.md"

          cat > ~/rpmbuild/SPECS/openrepo-sync.spec <<EOF
          Name:           openrepo-sync
          Version:        ${VERSION}
          Release:        1
          Summary:        Sync packages from upstream sources into an OpenRepo repository
          License:        MIT
          URL:            https://github.com/${{ github.repository }}

          %description
          openrepo-sync checks GitHub Releases, direct URLs, and SourceForge for
          new package versions, uploads them to a self-hosted OpenRepo instance,
          and prunes old releases beyond a configured keep count.

          %install
          mkdir -p %{buildroot}
          cp -a ${STAGE}/. %{buildroot}/

          %files
          /usr/bin/openrepo-sync
          /usr/share/man/man1/openrepo-sync.1.gz
          /usr/share/doc/openrepo-sync/README.md

          %changelog
          * $(LC_TIME=C date '+%a %b %d %Y') GitHub Actions <actions@github.com> - ${VERSION}-1
          - Automated release ${VERSION}
          EOF

          # --target (not BuildArch:) is required for cross-arch packaging:
          # rpm rejects a BuildArch that isn't in the host's compatible-arch
          # table (e.g. x86_64 host building for aarch64/armv7hl), even
          # though nothing here is actually compiled.
          rpmbuild --target "${ARCH}-linux" \
                   --define "_topdir $HOME/rpmbuild" \
                   -bb ~/rpmbuild/SPECS/openrepo-sync.spec

          RPM_FILE=$(find ~/rpmbuild/RPMS -name "*.rpm" | head -1)
          cp "$RPM_FILE" .
          echo "rpm_file=$(basename $RPM_FILE)" >> "$GITHUB_ENV"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: |
            *.deb
            *.rpm
          retention-days: 7

  # ── 4. Create GitHub release and attach all packages ──────────────────────
  release:
    name: Create release
    needs: [version, package]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist/

      - name: List release assets
        run: ls -lh dist/

      - name: Create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name:   ${{ needs.version.outputs.tag }}
          name:       ${{ needs.version.outputs.tag }}
          body: |
            ## openrepo-sync ${{ needs.version.outputs.tag }}

            ### Packages

            | File | Platform |
            |------|----------|
            | `openrepo-sync_*_amd64.deb` | Linux x86-64 (Debian/Ubuntu) |
            | `openrepo-sync_*_arm64.deb` | Linux ARM64 (Debian/Ubuntu) |
            | `openrepo-sync_*_armhf.deb` | Linux ARMhf (Debian/Ubuntu) |
            | `openrepo-sync-*.x86_64.rpm` | Linux x86-64 (RHEL/Fedora) |
            | `openrepo-sync-*.aarch64.rpm` | Linux ARM64 (RHEL/Fedora) |
            | `openrepo-sync-*.armv7hl.rpm` | Linux ARMhf (RHEL/Fedora) |

            ### Install (Debian/Ubuntu)
            ```sh
            sudo dpkg -i openrepo-sync_${{ needs.version.outputs.version }}_amd64.deb
            ```

            ### Install (RHEL/Fedora)
            ```sh
            sudo rpm -i openrepo-sync-${{ needs.version.outputs.version }}-1.x86_64.rpm
            ```
          files: dist/*
          fail_on_unmatched_files: true
